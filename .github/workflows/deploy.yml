name: Deploy PROD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy PROD with Ansible
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          ansible-playbook deploy-prod.yml --limit app -e "app_version=prod-${SHORT_SHA}"

      - name: Wait for PROD app to come up
        run: sleep 10

      - name: Check PROD app health
        run: |
          curl --fail --silent https://app.andrzejpusty.pl/health